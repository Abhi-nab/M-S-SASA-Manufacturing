<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturing Co.</title>
    <!-- Use this if the files are in the same folder as index.html -->
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <button id="authBtn" onclick="toggleModal(true)" class="btn primary">Sign In to Book</button>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <button onclick="toggleModal(false)" class="close-btn">&times;</button>
            <h2 id="modalTitle">Sign In</h2>
            <form id="authForm">
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="submit-btn">Submit</button>
            </form>
            <div class="modal-footer">
                <p id="toggleText">Don't have an account? <a href="#" onclick="switchMode()">Sign Up</a></p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
